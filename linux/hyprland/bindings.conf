# Hyper key app launchers — mirrors BetterTouchTool bindings from macOS.
# Hyper = Caps Lock (held) via keyd, which sends CTRL+SUPER+ALT+SHIFT.
$hyper = CTRL SUPER ALT SHIFT

# --- App stacks ---------------------------------------------------------
# A "stack" is a set of apps that Hyprland groups into a single tiled
# footprint; one hotkey summons the stack and rotates through its members
# (see linux/hyprland/app-stack). These rules only pin members to a home
# workspace so they co-locate — app-stack does the actual grouping, because
# Hyprland's `group` rule only auto-joins a window when a group is already
# focused, which a silent launch never satisfies. Classes are runtime
# values from `hyprctl clients`. To add a stack: pin its members here + add
# an app-stack binding below.

# Mail + Calendar (Hyper-Q) → ws3
windowrule = workspace 3 silent, match:class ^chrome-(mail|calendar)\.google\.com__-Default$

# Slack + Discord (Hyper-A) → ws3
windowrule = workspace 3 silent, match:class ^(slack|chrome-discord\.com__channels_@me-Default)$

# Messengers (Hyper-D) → ws4
windowrule = workspace 4 silent, match:class ^(signal|org\.telegram\.desktop|chrome-web\.whatsapp\.com__-Default)$

# app-stack builds groups explicitly, so don't let newly-opened windows
# (e.g. the editor) auto-join whatever group happens to be focused.
group {
  auto_group = false
}
# ------------------------------------------------------------------------

# Spotlight/Raycast-style launcher
bindd = $hyper, space, Launch apps, exec, omarchy-launch-walker

# Notification center — toggle do-not-disturb
bindd = $hyper, N, Toggle notification silencing, exec, omarchy-toggle-notification-silencing

# Screenshots — mirrors mac Cmd+Shift+3/4/5
bindd = $hyper, 3, Screenshot full screen, exec, omarchy-capture-screenshot fullscreen
bindd = $hyper, 4, Screenshot region, exec, omarchy-capture-screenshot region
bindd = $hyper, 5, Screenshot menu, exec, omarchy-capture-screenshot smart

# App launchers
bindd = $hyper, Q, Mail/Calendar stack, exec, $HOME/.dotfiles/linux/hyprland/app-stack "mail.google.com__|omarchy-launch-webapp https://mail.google.com" "calendar.google.com__|omarchy-launch-webapp https://calendar.google.com"
bindd = $hyper, W, Terminal (focus or launch), exec, omarchy-launch-or-focus ^com\.mitchellh\.ghostty$ "uwsm-app -- xdg-terminal-exec"
bindd = $hyper, E, Zed (focus or launch), exec, omarchy-launch-or-focus dev.zed.Zed "uwsm-app -- zeditor"
bindd = $hyper, R, Firefox (focus or launch), exec, omarchy-launch-or-focus ^firefox$ "uwsm-app -- firefox"
bindd = $hyper, A, Slack/Discord stack, exec, $HOME/.dotfiles/linux/hyprland/app-stack "slack|uwsm-app -- slack" "discord.com|omarchy-launch-webapp https://discord.com/channels/@me"
bindd = $hyper, S, Spotify, exec, omarchy-launch-or-focus spotify
bindd = $hyper, D, Messengers stack, exec, $HOME/.dotfiles/linux/hyprland/app-stack "web.whatsapp.com__|omarchy-launch-webapp https://web.whatsapp.com" "signal|uwsm-app -- signal-desktop" "org.telegram.desktop|uwsm-app -- Telegram"
bindd = $hyper, F, File manager (focus or launch), exec, omarchy-launch-or-focus org.gnome.Nautilus "uwsm-app -- nautilus --new-window"
bindd = $hyper, G, Terminal, exec, uwsm-app -- xdg-terminal-exec
bindd = $hyper, C, Obsidian, exec, omarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian --disable-gpu --enable-wayland-ime"

# Mac-style Cmd+Q quit. In apps where keyd rewrites Alt→Ctrl
# (Firefox, Slack, Zed, etc.) the app sees Ctrl+Q and quits itself;
# elsewhere this Hyprland binding fires killactive.
bindd = ALT, Q, Close window, killactive

# Window management — matches Fn+Hyper on macOS
bindd = $hyper, up, Toggle maximize, fullscreen, 0
bindd = $hyper, down, Toggle floating, togglefloating
bindd = $hyper, left, Tile left, movewindow, l
bindd = $hyper, right, Tile right, movewindow, r

# Sleep display
bindd = $hyper, escape, Sleep display, exec, sleep 0.5 && hyprctl dispatch dpms off
