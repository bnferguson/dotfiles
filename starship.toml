# Prompt: newline, then directory + git info, then prompt char on next line
format = """
$directory$git_branch$git_status$cmd_duration
$character"""

add_newline = true

[directory]
truncation_length = 1
truncate_to_repo = false
style = "bold cyan"

[git_branch]
format = "on [$branch]($style) "
style = "bold green"

[git_status]
format = "[$all_status$ahead_behind]($style)"
style = "bold red"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

[character]
success_symbol = "[›](bold)"
error_symbol = "[›](bold red)"

[cmd_duration]
min_time = 2_000
format = "took [$duration]($style) "
style = "yellow"

[ruby]
detect_files = ["Gemfile", ".ruby-version"]
format = "[$symbol($version)]($style) "

[golang]
detect_files = ["go.mod"]
format = "[$symbol($version)]($style) "

[nodejs]
detect_files = ["package.json", ".node-version"]
format = "[$symbol($version)]($style) "

[python]
detect_files = ["requirements.txt", "pyproject.toml", ".python-version"]
format = "[$symbol($version)]($style) "
