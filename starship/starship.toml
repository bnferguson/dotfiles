# Prompt: newline, then directory + VCS info, then prompt char on next line
# jj-starship handles both jj and pure git repos
format = """
$battery$directory${custom.jj}$cmd_duration
$character"""

add_newline = true

[battery]
full_symbol = "🔋"
charging_symbol = "⚡"
discharging_symbol = "🔋"

[[battery.display]]
threshold = 20
style = "bold red"

[[battery.display]]
threshold = 50
style = "bold yellow"

[directory]
truncation_length = 1
truncate_to_repo = false
style = "bold cyan"

[character]
success_symbol = "[›](bold)"
error_symbol = "[›](bold red)"

[cmd_duration]
min_time = 2_000
format = "took [$duration]($style) "
style = "yellow"

[ruby]
detect_files = ["Gemfile", ".ruby-version"]
format = "[$symbol($version)]($style) "

[golang]
detect_files = ["go.mod"]
format = "[$symbol($version)]($style) "

[nodejs]
detect_files = ["package.json", ".node-version"]
format = "[$symbol($version)]($style) "

[python]
detect_files = ["requirements.txt", "pyproject.toml", ".python-version"]
format = "[$symbol($version)]($style) "

[custom.jj]
when = "jj-starship detect"
shell = ["jj-starship"]
format = "$output "
